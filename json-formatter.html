<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #error-msg {
            color: #dc3545;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            font-weight: bold;
        }
        .label {
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JSON 格式化工具</h1>
        
        <div>
            <div class="label">输入原始 JSON:</div>
            <textarea id="input-json" placeholder="在此处粘贴您的 JSON 字符串..."></textarea>
        </div>

        <div class="controls">
            <button id="format-btn">格式化 JSON</button>
            <button id="clear-btn" style="background-color: #6c757d;">清空</button>
        </div>
        
        <div id="error-msg"></div>

        <div>
            <div class="label">格式化结果:</div>
            <textarea id="output-json" readonly placeholder="格式化后的 JSON 将显示在这里..."></textarea>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const inputJson = document.getElementById('input-json');
            const outputJson = document.getElementById('output-json');
            const formatBtn = document.getElementById('format-btn');
            const clearBtn = document.getElementById('clear-btn');
            const errorMsg = document.getElementById('error-msg');

            formatBtn.addEventListener('click', function() {
                const rawJson = inputJson.value.trim();
                
                if (!rawJson) {
                    errorMsg.textContent = '请输入 JSON 字符串';
                    outputJson.value = '';
                    return;
                }

                try {
                    const parsed = JSON.parse(rawJson);
                    const formatted = JSON.stringify(parsed, null, 4);
                    outputJson.value = formatted;
                    errorMsg.textContent = ''; // 清除之前的错误信息
                } catch (e) {
                    errorMsg.textContent = '无效的 JSON 格式: ' + e.message;
                    outputJson.value = '';
                }
            });

            clearBtn.addEventListener('click', function() {
                inputJson.value = '';
                outputJson.value = '';
                errorMsg.textContent = '';
                inputJson.focus();
            });
        });
    </script>
</body>
</html>
